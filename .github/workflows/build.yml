name: Build Java Launcher

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build launcher
        shell: cmd
        run: echo. | scripts\build-win.cmd

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCLauncherRevival
          path: MCLauncherRevival.jar
