name: Build Java Launcher

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build launcher
        shell: cmd
        run: echo. | scripts\build-win.cmd

      - name: Smoke test launcher
        shell: cmd
        run: java -jar MCLauncherRevival.jar --smoke-test

      - name: Run launcher self-tests
        shell: cmd
        run: scripts\test-win.cmd

      - name: Build and verify standard release ZIP
        shell: cmd
        run: echo. | scripts\package-release.cmd ci

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCLauncherRevival
          path: MCLauncherRevival.jar

  macos-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "8"

      - name: Check macOS scripts
        shell: bash
        run: sh -n build-macos.sh run-macos.sh package-macos.sh scripts/build-macos.sh scripts/run-macos.sh

      - name: Build launcher
        shell: bash
        run: ./build-macos.sh

      - name: Verify launcher jar
        shell: bash
        run: test -f MCLauncherRevival.jar

      - name: Smoke test launcher
        shell: bash
        run: java -jar MCLauncherRevival.jar --smoke-test

      - name: Run launcher self-tests
        shell: bash
        run: ./scripts/test-java.sh

      - name: Package unsigned macOS app
        shell: bash
        run: ./package-macos.sh

      - name: Verify app bundle
        shell: bash
        run: test -d dist/MCLauncherRevival.app/Contents/MacOS

  linux-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Check Linux scripts
        shell: bash
        run: sh -n scripts/build-linux.sh scripts/run-linux.sh

      - name: Build launcher
        shell: bash
        run: sh ./scripts/build-linux.sh

      - name: Verify launcher jar
        shell: bash
        run: test -f MCLauncherRevival.jar

      - name: Smoke test launcher through Linux runner
        shell: bash
        run: ./scripts/run-linux.sh --smoke-test

      - name: Run launcher self-tests
        shell: bash
        run: ./scripts/test-java.sh
